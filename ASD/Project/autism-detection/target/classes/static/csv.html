<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CSV Analysis Result</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(rgba(0,0,0,0.5),
    rgba(0,0,0,0.5)),

    url('https://images.unsplash.com/photo-1526256262350-7da7584cf5eb?q=80&w=1600&auto=format&fit=crop');

    background-size:cover;
    background-position:center;

    padding:20px;
}

.container{

    width:100%;
    max-width:1100px;

    background:rgba(255,255,255,0.15);

    backdrop-filter:blur(12px);

    border-radius:25px;

    padding:40px;

    box-shadow:0px 0px 30px rgba(0,0,0,0.4);

    color:white;

    animation:fadeIn 1s ease;
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(-20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

.title{

    text-align:center;
    margin-bottom:40px;
}

.title h1{

    font-size:55px;
    margin-bottom:10px;
}

.title span{

    color:#ffeaa7;
}

.title p{

    font-size:20px;
    color:#eee;
}

.cards{

    display:flex;
    gap:30px;
    flex-wrap:wrap;
    justify-content:center;
}

.card{

    flex:1;
    min-width:300px;

    padding:35px;

    border-radius:25px;

    text-align:center;

    box-shadow:0px 5px 20px rgba(0,0,0,0.3);

    transition:0.3s;
}

.card:hover{

    transform:translateY(-10px) scale(1.03);
}

.autism{

    background:
    linear-gradient(135deg,#ff416c,#ff4b2b);
}

.normal{

    background:
    linear-gradient(135deg,#00b894,#00cec9);
}

.card h2{

    font-size:35px;
    margin-bottom:20px;
}

.percent{

    font-size:75px;
    font-weight:bold;
}

.analysis{

    margin-top:40px;

    background:rgba(255,255,255,0.12);

    padding:30px;

    border-radius:20px;
}

.analysis h2{

    margin-bottom:20px;

    font-size:30px;
}

.bar{

    width:100%;
    height:35px;

    background:#ddd;

    border-radius:30px;

    overflow:hidden;

    margin-top:20px;
}

.fill{

    height:100%;
    width:50%;

    background:
    linear-gradient(to right,#00b894,#55efc4);

    text-align:center;

    line-height:35px;

    font-weight:bold;

    color:white;

    font-size:18px;
}

.stats{

    display:flex;
    gap:20px;

    margin-top:40px;

    flex-wrap:wrap;
}

.stat-box{

    flex:1;
    min-width:220px;

    background:rgba(255,255,255,0.15);

    padding:30px;

    border-radius:20px;

    text-align:center;

    box-shadow:0px 5px 15px rgba(0,0,0,0.2);

    transition:0.3s;
}

.stat-box:hover{

    transform:scale(1.05);
}

.stat-box h3{

    font-size:45px;

    color:#ffeaa7;

    margin-bottom:10px;
}

.stat-box p{

    font-size:18px;
    color:#f1f1f1;
}

.btns{

    margin-top:40px;

    display:flex;
    gap:20px;

    justify-content:center;

    flex-wrap:wrap;
}

button{

    padding:15px 35px;

    border:none;

    border-radius:12px;

    font-size:18px;

    font-weight:bold;

    color:white;

    cursor:pointer;

    transition:0.3s;
}

.back-btn{

    background:#6c5ce7;
}

.back-btn:hover{

    background:#4834d4;

    transform:scale(1.05);
}

.logout-btn{

    background:#e74c3c;
}

.logout-btn:hover{

    background:#c0392b;

    transform:scale(1.05);
}

</style>

</head>

<body>

<div class="container">

    <div class="title">

        <h1>CSV <span>Analysis Result</span></h1>

        <p>Autism Detection Dataset Visualization</p>

    </div>

    <div class="cards">

        <div class="card autism">

            <h2>Autism</h2>

            <div class="percent">50%</div>

        </div>

        <div class="card normal">

            <h2>No Autism</h2>

            <div class="percent">50%</div>

        </div>

    </div>

    <div class="analysis">

        <h2>Detailed Analysis</h2>

        <p>Autism Detection Rate</p>

        <div class="bar">

            <div class="fill">
                50%
            </div>

        </div>

    </div>

    <div class="stats">

        <div class="stat-box">

            <h3>100</h3>

            <p>Total Records</p>

        </div>

        <div class="stat-box">

            <h3>50</h3>

            <p>Autism Cases</p>

        </div>

        <div class="stat-box">

            <h3>50</h3>

            <p>No Autism Cases</p>

        </div>

    </div>

    <div class="btns">

        <button class="back-btn"
        onclick="goBack()">

            Back

        </button>

        <button class="logout-btn"
        onclick="logout()">

            Logout

        </button>

    </div>

</div>

<script>

function goBack(){

    window.location.href="/index.html";
}

function logout(){

    sessionStorage.removeItem("loggedIn");

    window.location.href="/login.html";
}

</script>

</body>
</html>
